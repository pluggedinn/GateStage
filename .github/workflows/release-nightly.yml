name: Release Nightly

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-nightly
  cancel-in-progress: true

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            electron_args: --mac
          - os: windows-latest
            electron_args: --win
          - os: ubuntu-latest
            electron_args: --linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2t64 \
            rpm fakeroot

      - name: Install npm dependencies
        run: npm ci

      - name: Set nightly version
        shell: bash
        run: |
          BASE="$(node -p "require('./package.json').version")"
          DATE="$(date -u +%Y%m%d)"
          SHORT_SHA="${GITHUB_SHA::7}"
          NIGHTLY_VERSION="${BASE}-nightly.${DATE}+${SHORT_SHA}"
          # npm / electron-builder reject '+' in some paths — use dotted build id
          NIGHTLY_VERSION="${BASE}-nightly.${DATE}.${SHORT_SHA}"
          echo "NIGHTLY_VERSION=${NIGHTLY_VERSION}" >> "$GITHUB_ENV"
          npm version "$NIGHTLY_VERSION" --no-git-tag-version --allow-same-version

      - name: Build Next standalone + Electron
        run: npm run build:desktop -- ${{ matrix.electron_args }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.os }}
          path: dist/desktop/
          if-no-files-found: warn

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p upload
          find release-assets -type f \
            \( -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.zip' \) \
            -exec cp -n {} upload/ \;
          ls -la upload

      - name: Remove previous Nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete nightly --yes || true

      - name: Publish Nightly prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          make_latest: false
          generate_release_notes: false
          body: |
            **Nightly build** from `main` (`${{ github.sha }}`).

            This is an automated prerelease. Prefer a tagged `v*` release for race-day use.

            Installers are unsigned in v1 — macOS Gatekeeper / Windows SmartScreen may warn.
          files: upload/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
