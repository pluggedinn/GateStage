# GateStage — ESPHome gate firmware (Seeed XIAO ESP32-C5)
#
# Flash one copy per gate. Change `esphome.name` for each device (gate-start,
# gate-finish, etc.) — that name is the gate ID GateStage discovers via mDNS.
#
# Hardware (default in this file):
#   - Seeed XIAO ESP32-C5
#   - WS2811 addressable strip, 60 LEDs, data on D8 (GPIO8)
#   - 12 V strip PSU wired separately; ESP drives data only (share GND with PSU)
#
# Effects match `lib/effects.ts`: Pulse, Strobe, Color Wipe, Rainbow.
# Rainbow speed/width are runtime-tunable via REST number entities.

esphome:
  name: gate-1
  friendly_name: Gate 1
  on_boot:
    # Restore runs in light setup(); re-apply after hardware is up (RMT strip).
    - priority: -100
      then:
        - delay: 300ms
        - light.turn_on:
            id: gate_led
            transition_length: 0s

esp32:
  board: esp32-c5-devkitc-1
  variant: esp32c5
  flash_size: 8MB
  framework:
    type: esp-idf

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

mdns:

wifi:
  networks:
    - ssid: "I dont take naps-5G"
      password: "broccoli"
      priority: 10
    - ssid: "Whoop Racing"
      password: "tinywhoop"
      priority: 5
  band_mode: 5GHZ
  fast_connect: false
  power_save_mode: none
  ap:
    ssid: "GateStage-gate-1"
    password: "tinywhoop"

api:

ota:
  - platform: esphome
  - platform: web_server

web_server:
  port: 80
  local: true

# Runtime Rainbow parameters (GateStage sets these via REST before turn_on)
globals:
  - id: g_rainbow_speed
    type: int
    restore_value: false
    initial_value: "10"
  - id: g_rainbow_width
    type: int
    restore_value: false
    initial_value: "50"

number:
  - platform: template
    name: "FX Rainbow Speed"
    optimistic: true
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 10
    set_action:
      - globals.set:
          id: g_rainbow_speed
          value: !lambda "return (int) x;"
  - platform: template
    name: "FX Rainbow Width"
    optimistic: true
    min_value: 1
    max_value: 255
    step: 1
    initial_value: 50
    set_action:
      - globals.set:
          id: g_rainbow_width
          value: !lambda "return (int) x;"

sensor:
  - platform: internal_temperature
    name: "ESP Temperature"
    update_interval: 60s

light:
  - platform: esp32_rmt_led_strip
    id: gate_led
    name: "Gate LEDs"
    pin: GPIO8
    num_leds: 60
    rgb_order: RGB
    chipset: ws2811
    use_psram: false
    rmt_symbols: 96
    default_transition_length: 0s
    restore_mode: RESTORE_AND_ON
    initial_state:
      state: true
      brightness: 5%
      color_mode: rgb
      red: 100%
      green: 0%
      blue: 0%
    effects:
      - pulse:
          name: Pulse
          transition_length: 1s
          update_interval: 1s
          min_brightness: 0%
          max_brightness: 100%
      - strobe:
          name: Strobe
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 100%
              blue: 100%
              duration: 500ms
            - state: false
              duration: 250ms
            - state: true
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              duration: 500ms
      - addressable_lambda:
          name: Rainbow
          update_interval: 16ms
          lambda: |-
            static uint32_t tick = 0;
            const int speed = id(g_rainbow_speed);
            const int width = id(g_rainbow_width);
            const int size = it.size();
            if (size == 0) return;
            for (int i = 0; i < size; i++) {
              float hue = fmodf((tick * speed * 6.0f / width) + (i * 360.0f / width), 360.0f);
              esphome::light::ESPHSVColor hsv;
              hsv.hue = (uint8_t) (hue * 255.0f / 360.0f);
              hsv.saturation = 255;
              hsv.value = 255;
              it[i] = hsv;
            }
            tick++;
      - addressable_color_wipe:
          name: Color Wipe
          colors:
            - red: 100%
              green: 0%
              blue: 0%
              num_leds: 3
              gradient: true
            - red: 0%
              green: 0%
              blue: 100%
              num_leds: 1
          add_led_interval: 100ms
          reverse: false
